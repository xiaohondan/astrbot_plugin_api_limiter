name: Auto Label & Assign Issues

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Auto label issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;

            const labels = [];

            if (/bug|错误|崩溃|闪退|报错|异常|fail|error|crash/i.test(text)) {
              labels.push('bug');
            }
            if (/建议|优化|改进|feature|enhancement|提议|希望|能否|支持|添加|新增/i.test(text)) {
              labels.push('enhancement');
            }
            if (/问题|疑问|问一下|提问|怎么|如何|help|question|怎么办/i.test(text)) {
              labels.push('question');
            }
            if (/文档|doc|readme|说明|README/i.test(text)) {
              labels.push('documentation');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            } else {
              // Default label for uncategorized issues
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['triage']
                });
                console.log('Added default label: triage');
              } catch (e) {
                console.log('No triage label found, skipping');
              }
            }

      - name: Auto assign to owner
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: ['xiaohondan']
              });
              console.log('Assigned to xiaohondan');
            } catch (e) {
              console.log('Failed to assign: ' + e.message);
            }

      - name: Comment welcome message
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const isBug = /bug|错误|崩溃|闪退|报错|异常/i.test(title + ' ' + (context.payload.issue.body || '').toLowerCase());

            let comment = '## 👋 感谢反馈！\n\n';
            comment += '我们会尽快处理这个 Issue。\n\n';

            if (isBug) {
              comment += '### Bug 报告清单\n';
              comment += '为了更快定位问题，请补充以下信息：\n';
              comment += '- 插件版本（plugin version）\n';
              comment += '- AstrBot 版本\n';
              comment += '- 复现步骤\n';
              comment += '- 相关日志或截图\n\n';
            }

            comment += '> 此消息由 NekoAiDev Bot 🐱 自动发送';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
